<!DOCTYPE html>
<html>
<head>
<style> 
.container {
  display: grid;
  grid-template-columns: auto auto auto;
  background-color: dodgerblue;
  padding: 5px;
  gap: 5px;
}

.container div {
  background-color: #f1f1f1;
  color:#000;
  padding: 10px;
  font-size: 30px;
  text-align: center;
}

.item1 {justify-self: right;}
.item6 {justify-self: center;}
</style>
</head>
<body>

<h2>The justify-self property</h2>

<p>The justify-self property is used to align a grid item within its grid cell in the inline direction.</p>

<div class="container">
  <div class="item1">1</div>
  <div class="item2">2</div>
  <div class="item3">3</div>  
  <div class="item4">4</div>
  <div class="item5">5</div>
  <div class="item6">6</div>
</div>

</body>
</html>
