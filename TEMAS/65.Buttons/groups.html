<!DOCTYPE html>
<html>
<head>
<style>
.btn-group {
  display: flex;
  flex-wrap: wrap;
}

.button {
  background-color: #04AA6D;
  border: none;
  color: white;
  padding: 15px 32px;
  text-align: center;
  text-decoration: none;
  font-size: 16px;
  cursor: pointer;
}

.btn-group .button:hover {
  background-color: dodgerblue;
}
</style>
</head>
<body>

<h2>Create a Button Group</h2>

<p>Wrap the buttons in a div element, and add display:flex to the div element:</p>

<div class="btn-group">
  <button class="button">Button</button>
  <button class="button">Button</button>
  <button class="button">Button</button>
  <button class="button">Button</button>
</div>

<p>Resize the screen to see what happens on small screens.</p>

</body>
</html>
