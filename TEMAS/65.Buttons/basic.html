<!DOCTYPE html>
<html>
<head>
<style>
.button {
  background-color: #04AA6D;
  border: none;
  color: white;
  padding: 15px 32px;
  text-align: center;
  text-decoration: none;
  display: inline-block;
  font-size: 16px;
  margin: 4px 2px;
  cursor: pointer;
}
</style>
</head>
<body>

<h2>CSS Basic Button Styling</h2>

<p>Default button with no styling:</p>
<button>Click me</button>

<p>An a element styled as a button:</p>
<a href="#" class="button">Click me</a>

<p>A button element:</p>
<button class="button">Click me</button>

<p>An input element of type button:</p>
<input type="button" class="button" value="Click me">

</body>
</html>
