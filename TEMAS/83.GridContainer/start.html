<!DOCTYPE html>
<html>
<head>
<style>
.container {
  display: grid;
  grid-template-columns: 70px 70px 70px;
  background-color: dodgerblue;
  padding: 5px;
  gap: 5px;
  justify-content: start;
}

.container div {
  background-color: #f1f1f1;
  color:#000;
  padding: 10px;
  font-size: 30px;
  text-align: center;
}
</style>
</head>
<body>

<h1>justify-content: start</h1>

<p>Use the <em>justify-content</em> property to align the grid items inside the container.</p>

<p>The value "start" positions the grid items at the start of the container:</p>

<div class="container">
  <div>1</div>
  <div>2</div>
  <div>3</div>  
  <div>4</div>
  <div>5</div>
  <div>6</div>
</div>

</body>
</html>
