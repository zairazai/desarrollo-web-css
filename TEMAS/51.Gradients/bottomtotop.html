<html>
<head>
<style>
#grad1 {
  height: 200px;
  background-color: red; /* For browsers that do not support gradients */

</style>
</head>
<body>

<h1>Linear Gradient - Bottom to Top</h1>
<p>This linear gradient starts red at the bottom, transitioning to yellow at the top:</p>

<div id="grad1"></div>
