<!DOCTYPE html>
<html>
<head>
<style>
.image-container {
  width: 200px;
  height: 300px;
  border: 1px solid black;
  margin-bottom: 25px;
}

.image-container img {
  width: 100%;
  height: 100%;
  object-fit: contain;
}
</style>
</head>
<body>

<h2>Using object-fit: contain</h2>

<p>The object-fit: contain; value preserves the aspect ratio, and fits the image inside the container, without cutting - will leave empty space if needed:</p>

<div class="image-container">
  <img src="paris.jpg" alt="Paris" width="400" height="300">
</div>

<div class="image-container">
  <img src="pineapple.jpg" alt="Pineapple" width="300" height="300">
</div>

</body>
</html>
