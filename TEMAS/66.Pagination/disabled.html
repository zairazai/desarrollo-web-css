<!DOCTYPE html>
<html>
<head>
<style>
.pagination {
  display: flex;
  justify-content: center;
  list-style: none;
  padding: 0px;
}

.pagination li a {
  display: block;
  padding: 8px 12px;
  text-decoration: none;
  border: 1px solid gray;
  color: black;  
  margin: 0 4px;
  border-radius: 5px;
}

.pagination li a.active {
  background-color: #4CAF50;
  color: white;
}

.pagination li a.disabled {
  color: #dddddd;
  cursor: not-allowed;
  pointer-events: none;
}
</style>
</head>
<body>

<h2>Pagination with a Disabled State</h2>

<ul class="pagination">
  <li><a href="#">&laquo;</a></li>
  <li><a href="#">1</a></li>
  <li><a href="#">2</a></li>
  <li><a href="#">3</a></li>
  <li><a href="#">4</a></li>
  <li><a class="active" href="#">5</a></li>
  <li><a class="disabled" href="#">&raquo;</a></li>
</ul>

</body>
</html>
