<!DOCTYPE html>
<html>
<head>
<style>
.mask1 {
  -webkit-mask-image: linear-gradient(black, transparent);
  mask-image: linear-gradient(black, transparent);
}
</style>
</head>
<body>

<h1>A linear gradient as the mask layer</h1>

<p>A linear gradient as a mask layer:</p>
<img class="mask1" src="img_5terre.jpg" alt="Cinque Terre" width="600" height="400">

<p>Original image:</p>
<img src="img_5terre.jpg" alt="Cinque Terre" width="600" height="400">

</body>
</html>
