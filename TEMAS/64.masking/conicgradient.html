<!DOCTYPE html>
<html>
<head>
<style>
.mask3 {
  -webkit-mask-image: conic-gradient(black 0deg, transparent 360deg);
  mask-image: conic-gradient(black 0deg, transparent 360deg);
}
</style>
</head>
<body>

<h1>A conic gradient as the mask layer</h1>

<p>A conic gradient as a mask layer (an ellipse):</p>
<img class="mask3" src="img_5terre.jpg" alt="Cinque Terre" width="600" height="400">

<p>Original image:</p>
<img src="img_5terre.jpg" alt="Cinque Terre" width="600" height="400">

</body>
</html>
